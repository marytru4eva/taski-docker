name: Main Taski Workflow

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install flake8 pytest
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          cd backend
          flake8 . --max-line-length=120

      - name: Run tests
        run: |
          cd backend
          python manage.py test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/taski-backend:latest ./backend
          echo "✅ Backend image built"

      - name: Build nginx image
        run: |
          if [ -f "nginx/Dockerfile" ]; then
            docker build -t ${{ secrets.DOCKER_USERNAME }}/taski-nginx:latest ./nginx
            echo "✅ Nginx image built"
          fi

      - name: Push backend to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/taski-backend:latest
          echo "✅ Backend image pushed"

      - name: Push nginx to Docker Hub
        run: |
          if [ -f "nginx/Dockerfile" ]; then
            docker push ${{ secrets.DOCKER_USERNAME }}/taski-nginx:latest
            echo "✅ Nginx image pushed"
          fi

      - name: Show all images
        run: docker images
